hardware:
  backend: cpu

architecture:
  vocab_size: 50257
  hidden_size: 1024
  intermediate_size: 3072
  num_layers: 12
  num_attention_heads: 16
  num_key_value_heads: 8
  max_position_embeddings: 32768
  rms_norm_eps: 1.0e-6

training:
  batch_size: 1            # Placed at 1 to completely maximize VRAM safety on T4
  sequence_length: 512
  steps: 50
  learning_rate: 2.0e-4
  weight_decay: 0.1
  seed: 42

dataset:
  type: "synthetic"
  num_samples: 1000

benchmark:
  enable_tensorboard: true
  profiler: "xplane"

output:
  base_output_directory: "/content/drive/MyDrive/Qwen0.6B_AnalysisRealdata/outputs"
  run_name: "cpu_0.6b_benchmark_syntheticdata"